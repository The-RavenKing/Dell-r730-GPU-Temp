<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Dashboard Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

        :root {
            --bg-0: #08121b;
            --bg-1: #10222f;
            --panel: rgba(11, 27, 39, 0.78);
            --line: rgba(139, 190, 216, 0.25);
            --text: #e8f4ff;
            --muted: #9cb4c3;
            --accent: #35c4ff;
            --accent-2: #6ef3da;
            --danger: #ff9f9f;
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 20% 12%, #103c56 0%, transparent 40%),
                radial-gradient(circle at 82% 14%, #1d5b48 0%, transparent 35%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1));
            display: grid;
            place-items: center;
            padding: 18px;
        }

        .login-card {
            width: min(420px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: 0 20px 46px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 26px;
            animation: rise .45s ease both;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            margin-bottom: 18px;
        }

        .header h1 {
            font-size: 1.45rem;
            letter-spacing: .02em;
            margin-bottom: 6px;
        }

        .header p {
            color: var(--muted);
            font-size: .88rem;
            line-height: 1.4;
        }

        .error-message {
            border: 1px solid rgba(255, 127, 127, 0.55);
            background: rgba(80, 19, 19, 0.86);
            color: var(--danger);
            border-radius: 10px;
            font-size: .86rem;
            padding: 10px 12px;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .08em;
            font-size: .72rem;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: rgba(6, 21, 31, 0.74);
            color: var(--text);
            padding: 11px 12px;
            font: inherit;
            outline: none;
            transition: .2s ease;
        }

        .form-group input:focus {
            border-color: rgba(53, 196, 255, 0.8);
            box-shadow: 0 0 0 3px rgba(53, 196, 255, 0.2);
        }

        .login-btn {
            width: 100%;
            margin-top: 4px;
            border: 1px solid rgba(53, 196, 255, 0.72);
            border-radius: 11px;
            background: linear-gradient(90deg, rgba(53, 196, 255, 0.25), rgba(110, 243, 218, 0.18));
            color: var(--text);
            padding: 11px 14px;
            font: inherit;
            font-weight: 700;
            letter-spacing: .02em;
            cursor: pointer;
            transition: .2s ease;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 9px 22px rgba(53, 196, 255, 0.24);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="header">
            <h1>GPU Cooling Control</h1>
            <p>Secure access to Dell R730 thermal strategy and fan telemetry.</p>
        </div>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
    </div>
</body>

</html>
