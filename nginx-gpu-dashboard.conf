# GPU Dashboard - Nginx Reverse Proxy Configuration
#
# Place this in /etc/nginx/sites-available/ and symlink to sites-enabled:
#   sudo ln -s /etc/nginx/sites-available/gpu-dashboard /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name gpu.yourdomain.com;  # Change to your subdomain

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gpu.yourdomain.com;  # Change to your subdomain

    # SSL certificates (e.g. from Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/gpu.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gpu.yourdomain.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for long-polling/real-time updates
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
